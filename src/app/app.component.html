<div class="app-shell">
  <header class="site-header">
    <a class="brand" routerLink="/">ROOC</a>

    <nav class="main-nav" aria-label="Primary navigation">
      <a routerLink="/" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="active">
        Home
      </a>

      <div class="nav-dropdown">
        <button type="button" class="dropdown-toggle">Calculator</button>
        <div class="dropdown-menu">
          <a routerLink="/calculator/feathers" routerLinkActive="active">Feathers</a>
          <a routerLink="/calculator/cards" routerLinkActive="active">Cards</a>
        </div>
      </div>

      <a routerLink="/pets" routerLinkActive="active">Pets</a>
      <a routerLink="/enchants" routerLinkActive="active">Enchants</a>
    </nav>
  </header>

  <main class="page-content">
    <router-outlet />
  </main>
</div>
